<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация | ULTRA FITNESS</title>
    <link rel="stylesheet" href="css/register.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
 <div id="particles-js"></div>


<header>
    <a href="index.html" class="logo">ULTRA FITNESS</a>
</header>

<div class="register-container">

    <h1 class="title">Регистрация</h1>
    <p id="stepLabel" class="step-label">Основная информация</p>

    <!-- ШАГ 1 -->
    <form id="step1" class="step active">
        <label>ФИО</label>
        <input type="text" id="regName" placeholder="Введите Ваше ФИО" required>

        <label>Номер телефона</label>
        <div class="phone-box">
            <input type="text" id="regPhone" placeholder="+7 (___) ___-__-__" required>
            <button type="button" id="sendCodeBtn">Выслать код</button>
        </div>

        <label>Email</label>
        <input type="email" id="regEmail" placeholder="example@mail.com" required>

        <button type="button" class="next-btn" id="toStep2Btn" disabled>Следующий шаг</button>
    </form>

    <!-- ШАГ 2 -->
    <form id="step2" class="step">
        <label>Введите код подтверждения</label>
        <input type="text" id="confirmCode" placeholder="____" maxlength="4">

        <p id="timerText" class="timer-text">Отправить код повторно через <span id="time">60</span> сек.</p>
        <button type="button" class="next-btn grey" id="resendBtn" disabled>Выслать код повторно</button>

        <button type="button" class="next-btn" id="toStep3Btn">Подтвердить</button>

        <p id="errorMessage" class="error"></p>
    </form>
    <p style="text-align:center; margin-top: 10px;">
    <a href="#" id="goLogin" class="btn-orange" style="background:none;color:#ff7a00;">
        Уже есть аккаунт? Войти
    </a>
</p>

    <!-- ШАГ 3 -->
    <form id="step3" class="step">
        <label>Пароль</label>
        <input type="password" id="regPass1">

        <label>Повторите пароль</label>
        <input type="password" id="regPass2">

        <p id="passError" class="error"></p>

        <button type="button" class="next-btn" id="finishBtn">Завершить регистрацию</button>
    </form>
</div>

<script src="js/register.js"></script>
<script src="js/global.js"></script>
<script src="https://cdn.jsdelivr.net/npm/particles.js"></script>
<script>
particlesJS("particles-js", {
    particles: {
        number: { value: 60 },
        size: { value: 3 },
        opacity: { value: .3 },
        move: { speed: .6 },
        color: { value: "#ffffff" }
    }
});
</script>

</body>
</html>
